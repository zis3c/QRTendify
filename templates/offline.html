{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-screen bg-gray-50 p-4">
    <div class="bg-white rounded-3xl shadow-md border border-gray-200 p-8 text-center max-w-md w-full flex flex-col">
        <div class="mx-auto w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mb-6">
            <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 12l2 2 2-2"></path>
            </svg>
        </div>

        <h1 class="text-2xl font-bold text-gray-900 mb-3">You are offline</h1>
        <p class="text-gray-600 mb-6">
            Please check your connection.
        </p>

        <button onclick="window.location.reload()"
            class="w-full inline-flex items-center justify-center h-10 px-5 mt-2 rounded-xl text-sm font-semibold text-white bg-primary hover:bg-blue-700 shadow-md focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors duration-200">
            Try Again
        </button>
    </div>
</div>
{% endblock %}
