{% extends "base.html" %}

{% block content %}
<div class="app-shell-centered">
    <div class="app-card max-w-md text-center">
        <h2 class="app-title">Password Updated</h2>
        <p class="app-alert-success mb-5 mt-4">
            Your password has been reset successfully.
        </p>
        <p class="app-subtitle mb-6">
            You can now sign in using your new password.
        </p>
        <a href="{% url 'login' %}" class="app-btn-primary w-full">
            Login Now
        </a>
    </div>
</div>
{% endblock %}
