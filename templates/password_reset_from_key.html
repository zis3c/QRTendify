{% extends "base.html" %}

{% block content %}
<div class="app-shell-centered">
    <div class="app-card max-w-md text-center">
        <h2 class="app-title mb-2">Set New Password</h2>
        <p class="app-subtitle mb-6">Enter your new password below.</p>

        <form method="POST" action="" class="space-y-4 text-left">
            {% csrf_token %}

            <div class="form-group">
                <label for="id_password1">New Password</label>
                {{ form.password1 }}
            </div>

            <div class="form-group">
                <label for="id_password2">Confirm New Password</label>
                {{ form.password2 }}
            </div>

            {% for error in form.non_field_errors %}
            <p class="app-alert-danger">{{ error }}</p>
            {% endfor %}

            <button type="submit" class="app-btn-primary mt-2 w-full">
                Set Password
            </button>
        </form>
    </div>
</div>
{% endblock %}
